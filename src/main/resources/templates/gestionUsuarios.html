<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Usuarios</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: white;
            padding: 36px 32px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            max-width: 460px;
            width: 100%;
        }
        .card-header {
            text-align: center;
            margin-bottom: 28px;
        }
        .avatar {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            margin: 0 auto 14px auto;
        }
        h2 {
            color: #2d2d2d;
            font-size: 1.5rem;
        }
        .subtitle {
            color: #888;
            font-size: 0.9rem;
            margin-top: 4px;
        }
        hr {
            border: none;
            border-top: 2px solid #f0f0f0;
            margin: 20px 0;
        }
        .field {
            display: flex;
            align-items: center;
            padding: 12px 14px;
            border-radius: 10px;
            margin-bottom: 10px;
            background: #f8f9ff;
            transition: background 0.2s;
        }
        .field:hover { background: #eef0ff; }
        .field-icon { font-size: 1.3rem; margin-right: 12px; }
        .field-content { flex: 1; }
        .label {
            font-size: 0.75rem;
            color: #888;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .value {
            font-size: 1rem;
            color: #2d2d2d;
            font-weight: 500;
            margin-top: 2px;
        }
        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.82rem;
            font-weight: 600;
        }
        .badge-active { background: #e6f9ee; color: #27ae60; }
        .badge-inactive { background: #fdecea; color: #e74c3c; }
        .footer {
            text-align: center;
            margin-top: 24px;
            color: #aaa;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="card-header">
        <div class="avatar">👤</div>
        <h2>Perfil de Usuario</h2>
        <p class="subtitle">Información del sistema</p>
    </div>
    <hr>

    <div class="field">
        <span class="field-icon">🔢</span>
        <div class="field-content">
            <div class="label">ID</div>
            <div class="value" th:text="${Usuario.id}"></div>
        </div>
    </div>

    <div class="field">
        <span class="field-icon">👤</span>
        <div class="field-content">
            <div class="label">Nombre Completo</div>
            <div class="value" th:text="${Usuario.nombre}"></div>
        </div>
    </div>

    <div class="field">
        <span class="field-icon">🪪</span>
        <div class="field-content">
            <div class="label">Cédula</div>
            <div class="value" th:text="${Usuario.cedula}"></div>
        </div>
    </div>

    <div class="field">
        <span class="field-icon">📧</span>
        <div class="field-content">
            <div class="label">Correo Electrónico</div>
            <div class="value" th:text="${Usuario.correo}"></div>
        </div>
    </div>

    <div class="field">
        <span class="field-icon">✅</span>
        <div class="field-content">
            <div class="label">Estado</div>
            <div class="value">
                <span th:if="${Usuario.estado == 1}" class="badge badge-active">🟢 Activo</span>
                <span th:if="${Usuario.estado != 1}" class="badge badge-inactive">🔴 Inactivo</span>
            </div>
        </div>
    </div>

    <div class="footer">🔒 Sistema de Gestión de Usuarios &copy; 2025</div>
</div>

</body>
</html>
