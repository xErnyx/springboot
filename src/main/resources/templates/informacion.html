<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Información del Servidor</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
            padding: 40px 36px;
            border-radius: 16px;
            max-width: 480px;
            width: 100%;
            color: white;
        }
        .header {
            text-align: center;
            margin-bottom: 32px;
        }
        .server-icon {
            font-size: 52px;
            margin-bottom: 12px;
        }
        h1 {
            font-size: 1.6rem;
            color: #fff;
            margin-bottom: 6px;
        }
        .badge-online {
            display: inline-block;
            background: rgba(39,174,96,0.3);
            color: #2ecc71;
            border: 1px solid #2ecc71;
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 0.82rem;
            font-weight: 600;
        }
        hr {
            border: none;
            border-top: 1px solid rgba(255,255,255,0.15);
            margin: 24px 0;
        }
        .info-row {
            display: flex;
            align-items: center;
            padding: 14px 16px;
            background: rgba(255,255,255,0.07);
            border-radius: 10px;
            margin-bottom: 12px;
        }
        .info-icon { font-size: 1.4rem; margin-right: 14px; }
        .info-label {
            font-size: 0.73rem;
            color: rgba(255,255,255,0.5);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
        }
        .info-value {
            font-size: 1rem;
            color: #fff;
            margin-top: 2px;
        }
        .footer {
            text-align: center;
            color: rgba(255,255,255,0.4);
            font-size: 0.78rem;
            margin-top: 24px;
        }
    </style>
</head>
<body>
<div class="card">
    <div class="header">
        <div class="server-icon">🖥️</div>
        <h1 th:text="${Titulo}"></h1>
        <span class="badge-online">🟢 En línea</span>
    </div>
    <hr>
    <div class="info-row">
        <span class="info-icon">⚙️</span>
        <div>
            <div class="info-label">Aplicación</div>
            <div class="info-value" th:text="${App}"></div>
        </div>
    </div>
    <div class="info-row">
        <span class="info-icon">🌐</span>
        <div>
            <div class="info-label">Dirección IP</div>
            <div class="info-value" th:text="${IP}"></div>
        </div>
    </div>
    <div class="footer">🔒 Panel de información del servidor &copy; 2025</div>
</div>
</body>
</html>
